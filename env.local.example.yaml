# Private overrides — copy to env.local.yaml and fill in your secrets.
# env.local.yaml is gitignored; this example file IS committed.

google_calendar:
  # Private iCal URL from Google Calendar → Settings → [your calendar] →
  # "Secret address in iCal format"
  # Looks like: https://calendar.google.com/calendar/ical/.../private-XXXX.../basic.ics
  ical_url: ""

  # Calendar ID used when authenticating via OAuth (defaults to primary).
  # For a Google Workspace account set to your full email address.
  calendar_id: "your-email@gapps.ntust.edu.tw"

  # Events whose title contains any of these substrings (case-insensitive)
  # are treated as personal/non-work and excluded from daily-log output.
  exclude_keywords:
    - "worship"
    - "ifgf"
    - "icare"
    - "take transit"
    - "birthday"
    - "anniversary"
